name: model-training

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Setup CML
        uses: iterative/setup-cml@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate data
        run: python get_data.py

      - name: Train model
        run: python train.py --depth 2

      - name: Quality gate (accuracy threshold)
        run: |
          python - <<EOF
          import json
          with open("metrics.json", encoding="utf-8") as f:
              m = json.load(f)
          acc = float(m["accuracy"])
          assert acc >= 0.80, f"Accuracy too low: {acc}"
          print(f"Accuracy OK: {acc}")
          EOF

      - name: Build report
        env:
          REPO_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          set -e
          cat metrics.txt > report.md
          cml publish plot.png --md >> report.md

      - name: Comment report
        env:
          REPO_TOKEN: ${{ secrets.MY_PAT }}
        run: cml comment create report.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            metrics.txt
            metrics.json
            plot.png
            report.md